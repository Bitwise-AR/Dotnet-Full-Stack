<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3f3f7;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .result-box {
            background-color: #d3d6da;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .btn {
            width: 48%;
            margin-bottom: 10px;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 500px;">

            <h2 class="text-center mb-2">Index - Simple Calculator</h2>
            <p class="text-center text-muted">Trainer Name: Marimuthu</p>

            <!-- Form -->
            <form id="calcForm">
                <div class="mb-3">
                    <label class="form-label">First Number (Integer)</label>
                    <input type="number" id="num1" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Second Number (Integer)</label>
                    <input type="number" id="num2" class="form-control" required>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn btn-success" onclick="add()">Add</button>
                    <button type="button" class="btn btn-primary" onclick="subtract()">Subtract</button>
                    <button type="button" class="btn btn-warning" onclick="multiply()">Multiply</button>
                    <button type="button" class="btn btn-danger" onclick="divide()">Divide</button>
                </div>
            </form>

            <!-- Result -->
            <div class="result-box mt-3" id="result">
                Calculated Result will appear here
            </div>

        </div>
    </div>

    <script>
        function getValues() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);

            return { a, b };
        }

        function add() {
            let values = getValues();
            if (!values) return;

            let result = values.a + values.b;
            display(values.a, "+", values.b, result);
        }

        function subtract() {
            let values = getValues();
            if (!values) return;

            let result = values.a - values.b;
            display(values.a, "-", values.b, result);
        }

        function multiply() {
            let values = getValues();
            if (!values) return;

            let result = values.a * values.b;
            display(values.a, "×", values.b, result);
        }

        function divide() {
            let values = getValues();
            if (!values) return;

            if (values.b === 0) {
                alert("Cannot divide by zero");
                return;
            }

            let result = values.a / values.b;

            if (Number.isInteger(result)) {
                display(values.a, "÷", values.b, result);
            } else {
                display(values.a, "÷", values.b, result.toFixed(2));
            }
        }

        function display(a, op, b, result) {
            document.getElementById("result").innerHTML = `
        <div style="font-size: 18px; color: #555;">Calculated Result</div>
        <div style="font-size: 22px; font-weight: bold; margin-top: 5px;">
            ${a} ${op} ${b} = ${result}
        </div>
    `;
        }
    </script>

</body>

</html>
